server {
    listen       80;
    server_name  localhost;

    # Serve React static build
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # REQUIRED FOR REACT ROUTER:
        # Tries to find matching files/directories
        # If not found, falls back to index.html to allow client side routing
        try_files $uri $uri/ /index.html;
    }

    # Optional: Basic security headers & cache bypassing for JS/CSS files
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
